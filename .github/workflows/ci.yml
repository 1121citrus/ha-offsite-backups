name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/ha-offsite-backups

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint shell scripts with shellcheck
        # SC1090: can't follow dynamic source — source path is dynamic.
        # SC1091: source target is an install-time absolute path, not
        #         resolvable at lint time.
        # SC2148: files without a shebang are intentionally sourced libraries.
        run: |
          shellcheck \
            --shell=bash \
            --exclude=SC1090,SC1091,SC2148 \
            src/ha-offsite-backups \
            src/healthcheck \
            src/startup \
            src/include/common-functions

      - name: Lint markdown with markdownlint-cli
        run: |
          docker run --rm \
            -v "$PWD:/workdir:ro" \
            -w /workdir \
            ghcr.io/igorshubovych/markdownlint-cli:v0.48.0 \
            "**/*.md"

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  # Build image for vulnerability scanning.  Tests run in a bats container
  # that mounts the source, so they do not require this image.
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci-${{ github.sha }}

      - name: Save image for downstream jobs
        run: docker save "$IMAGE:ci-${{ github.sha }}" | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  # Bats tests mount the project source into a bats Docker container.  They
  # do not require the application image and run in parallel with the build.
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run bats test suite
        # Use -i (not -it) since there is no TTY in CI.
        run: docker run -i --rm -v "$PWD:/code" -w /code bats/bats:1.13.0 test

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  # Scans the built image before pushing.  Fails the job (and blocks push) if
  # any fixable HIGH or CRITICAL CVEs are found; unfixed CVEs are suppressed.
  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/image.tar.gz | docker load

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:ci-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  # Runs only on version tags and the staging branch; never on plain main pushes.
  # Version tags → image:X.Y.Z + image:latest
  # Staging branch → image:staging-<timestamp> + image:staging
  push:
    needs: [test, scan]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tags=${IMAGE}:${GITHUB_REF_NAME#v},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:staging-$(date -u +%Y.%m.%d.%H%M%S),${IMAGE}:staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-platform cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.tags.outputs.tags }}
