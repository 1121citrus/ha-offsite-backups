name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/ha-offsite-backups

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    uses: 1121citrus/shared-github-workflows/.github/workflows/lint.yml@main

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  # Build image for scanning and smoke tests.  The bats test suite mounts
  # project source directly so it runs in parallel with (not after) build.
  build:
    needs: lint
    uses: 1121citrus/shared-github-workflows/.github/workflows/build.yml@main
    with:
      image: 1121citrus/ha-offsite-backups

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  # Bats tests mount the project source into the bats container — no image
  # required — so they run in parallel with build after lint passes.
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run bats test suite
        # Use -i (not -it) since there is no TTY in CI.
        run: docker run -i --rm -v "$PWD:/code" -w /code bats/bats:1.13.0 test

  # ── Stage 3b: Image smoke test ─────────────────────────────────────────────
  # Run one built-image smoke test to catch packaging/runtime regressions not
  # visible in source-mounted bats tests.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: gunzip -c /tmp/image.tar.gz | docker load
 
      - name: Verify bash is available
        run: docker run --rm --entrypoint bash "$IMAGE:latest" --version

      - name: Verify aws CLI is available
        run: docker run --rm --entrypoint aws "$IMAGE:latest" --version

      - name: Verify common-functions is installed
        run: docker run --rm --entrypoint test "$IMAGE:latest" -f /usr/local/include/common-functions

      - name: Verify startup is executable
        run: docker run --rm --entrypoint test "$IMAGE:latest" -x /usr/local/bin/startup

      - name: Verify ha-offsite-backups is executable
        run: docker run --rm --entrypoint test "$IMAGE:latest" -x /usr/local/bin/ha-offsite-backups

      - name: Verify healthcheck is executable
        run: docker run --rm --entrypoint test "$IMAGE:latest" -x /usr/local/bin/healthcheck

      - name: Run image smoke test
        run: |
          cid=$(docker run -d --rm \
            -e AWS_S3_BUCKET_NAME=smoke-bucket \
            -e CRON_EXPRESSION='@daily' \
            "$IMAGE:latest")
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          sleep 3
          docker ps \
            --filter "id=$cid" \
            --filter "status=running" \
            --quiet | grep -q .

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  scan:
    needs: build
    uses: 1121citrus/shared-github-workflows/.github/workflows/scan.yml@main
    with:
      image: 1121citrus/ha-offsite-backups

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  push:
    needs: [scan, smoke-test, test]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    uses: 1121citrus/shared-github-workflows/.github/workflows/push.yml@main
    with:
      image: 1121citrus/ha-offsite-backups
    secrets: inherit
